<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPICBooks</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-4">

    <section class="toolbar-panel mb-4">

        <!-- barra ricerca + icona carrello -->
        <div class="row justify-content-between align-items-center g-3">

            <div class="col-md-6">

                <input
                    type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Cerca un libro..."
                >

            </div>

            <!-- icona carrello -->
            <div class="col-md-2 text-end">

                <a href="#cartSection" class="cart-icon" aria-label="Vai al carrello">
                    <i class="bi bi-cart3"></i>
                </a>

            </div>

        </div>

    </section>

    <!-- libri -->
    <div class="row g-4" id="booksContainer"></div>

</div>

<!-- carrello -->
<div class="container mt-4 mb-5" id="cartSection">
  <div class="card cart-panel shadow-sm">
    <div class="card-body">
      <h3 class="mb-3">Carrello</h3>

      <div id="cartContainer"></div>

      <h5 id="cartTotal">Carrello vuoto</h5>

    </div>
  </div>
</div>

<!-- JS -->
<script src="js/script.js"></script>
</body>
</html>
